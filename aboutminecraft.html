    <h1>Minecraft介绍</h1>
    
    <img src="minecraft_logo.png" alt="Minecraft" width="200" height="200">
    
    <p>Minecraft是一款由瑞典游戏设计师马库斯·泊松（通常称为Notch）创建的沙盒游戏。</p>
    
    <p>玩家可以在一个由方块构成的虚拟世界中自由探索和创造。游戏提供了各种模式和功能，包括生存模式、创造模式、冒险模式等。</p>
    
    <p>通过采集资源和制作工具，玩家可以建造房屋、城堡、设施和其他创意构建物。</p>
    
    <p>在Minecraft中，你还可以与其他玩家合作或竞争，探索无尽的可能性。</p>
